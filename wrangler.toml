name = "fx-strategy-doctor"
main = "functions/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "dist/public"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
ADMIN_USERNAME = "admin"

# ADMIN_PASSWORD は Cloudflare ダッシュボードの
# Settings > Environment variables で設定してください（暗号化推奨）

# KV Namespace for buyer accounts
# デプロイ前に以下のコマンドで KV namespace を作成してください:
#   npx wrangler kv namespace create BUYERS_KV
#   npx wrangler kv namespace create BUYERS_KV --preview
# 作成後、出力された ID を以下に貼り付けてください
[[kv_namespaces]]
binding = "BUYERS_KV"
id = "4bfd355d77d94fa8b52334d0f61cee3c"
preview_id = "0237590b7489429e948c3cf8466247de"

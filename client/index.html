<!doctype html>
<html lang="ja">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>FX Strategy Doctor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Analytics (Umami) - set VITE_ANALYTICS_ENDPOINT and VITE_ANALYTICS_WEBSITE_ID in .env to enable -->
    <script>
      (function() {
        var ep = "%VITE_ANALYTICS_ENDPOINT%";
        var id = "%VITE_ANALYTICS_WEBSITE_ID%";
        if (ep && id && !ep.includes("VITE_ANALYTICS")) {
          var s = document.createElement("script");
          s.defer = true;
          s.src = ep + "/umami";
          s.setAttribute("data-website-id", id);
          document.head.appendChild(s);
        }
      })();
    </script>
  </body>

</html>
